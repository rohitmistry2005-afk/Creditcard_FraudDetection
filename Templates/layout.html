<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FraudShield AI</title>

  <style>
    /* ── CSS Variables ── */
    :root {
      --bg-deep:      #05080f;
      --bg-card:      #0c1220;
      --bg-card2:     #0f1828;
      --bg-input:     #111d2e;
      --border:       rgba(56,189,248,0.12);
      --border-hot:   rgba(239,68,68,0.35);
      --accent-blue:  #38bdf8;
      --accent-cyan:  #06b6d4;
      --accent-red:   #ef4444;
      --accent-green: #22c55e;
      --accent-amber: #f59e0b;
      --text-primary: #e2eaf8;
      --text-muted:   #6b7fa8;
      --text-dim:     #3d5070;
      --glow-blue:    0 0 24px rgba(56,189,248,0.18);
      --glow-red:     0 0 18px rgba(239,68,68,0.22);
      --radius:       12px;
      --radius-sm:    8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* body {
      font-family: 'Inter', sans-serif;

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 0;
      padding: 0 28px;
      height: 58px;
      background: rgba(5,8,15,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex; align-items: center; gap: 9px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.25rem; font-weight: 700;
      letter-spacing: 2px; color: var(--text-primary);
      text-transform: uppercase; margin-right: 36px;
    }
    .nav-brand svg { color: var(--accent-blue); }

    .nav-links {
      display: flex; gap: 2px; flex: 1;
    }
    .nav-link {
      padding: 6px 16px;
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.5px;
      color: var(--text-muted); cursor: pointer;
      border-radius: 6px; position: relative;
      transition: color 0.2s;
      text-decoration: none;
    }
    .nav-link:hover { color: var(--text-primary); }
    .nav-link.active {
      color: var(--text-primary);
    }.nav-link.active::after {
  display: none;
}
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      background: var(--accent-red); border-radius: 99px;
      font-size: 0.65rem; font-weight: 700; color: #fff;
      margin-left: 5px; vertical-align: middle;
    }

    .nav-right {
      display: flex; align-items: center; gap: 16px; margin-left: auto;
    }
    .nav-icon-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg-card2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted);
      transition: border-color 0.2s, color 0.2s;
      position: relative;
    }
    .nav-icon-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
    .notif-dot {
      position: absolute; top: 5px; right: 5px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent-red);
      border: 2px solid var(--bg-deep);
    }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f 0%, #0c4a6e 100%);
      border: 1.5px solid var(--accent-blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: var(--accent-blue);
      cursor: pointer;
    }
    .user-name { font-size: 0.82rem; color: var(--text-primary); cursor: pointer; }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative; z-index: 1;
      padding: 24px 28px 40px;
      display: flex; flex-direction: column; gap: 22px;
    }

    /* ── STAT CARDS ROW ── */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px 14px;
      position: relative; overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .stat-card:hover {
      border-color: rgba(56,189,248,0.28);
      box-shadow: var(--glow-blue);
    }
    .stat-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(56,189,248,0.03) 0%, transparent 60%);
      pointer-events: none;
    }
    .stat-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 0.72rem; font-weight: 500; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .stat-badge {
      font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
      border-radius: 4px;
    }
    .stat-badge.green  { background: rgba(34,197,94,0.15); color: var(--accent-green); }
    .stat-badge.red    { background: rgba(239,68,68,0.15); color: var(--accent-red); }
    .stat-badge.urgent { background: var(--accent-red); color: #fff; }
    .stat-badge.saved  { background: rgba(34,197,94,0.18); color: var(--accent-green); }

    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.1rem; font-weight: 700; line-height: 1.1;
      color: var(--text-primary); margin-bottom: 10px;
    }

    /* Sparkline SVG */
    .sparkline { width: 100%; height: 36px; }

    /* ── GRID: Heatmap + Alert Queue ── */
    .mid-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 16px;
    }

    /* ── CARD BASE ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; font-weight: 600; letter-spacing: 0.5px;
    }
    .card-action {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: var(--text-muted);
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; cursor: pointer;
      transition: border-color 0.2s;
    }
    .card-action:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

    /* ── HEATMAP CARD ── */
    .heatmap-card { padding: 0; }
    .heatmap-body { padding: 16px 18px; position: relative; }
    .map-container {
      position: relative;
      width: 100%; padding-bottom: 62%;
      background: #07101c;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .map-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* ── ALERT QUEUE ── */
    .alert-body { padding: 0; }
    .alert-table { width: 100%; border-collapse: collapse; }
    .alert-table thead tr {
      border-bottom: 1px solid var(--border);
    }
    .alert-table thead th {
      font-size: 0.65rem; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 10px 14px; text-align: left;
    }
    .alert-table tbody tr {
      border-bottom: 1px solid rgba(56,189,248,0.06);
      transition: background 0.15s;
    }
    .alert-table tbody tr:hover { background: rgba(56,189,248,0.04); }
    .alert-table tbody tr:last-child { border-bottom: none; }
    .alert-table td { padding: 12px 14px; vertical-align: middle; }

    .txn-id {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem; color: var(--text-primary);
    }
    .txn-flag {
      font-size: 0.62rem; color: var(--accent-red); margin-top: 2px;
    }
    .txn-amount-main { font-size: 0.82rem; font-weight: 600; }
    .txn-amount-sub { font-size: 0.62rem; color: var(--text-muted); }
    .risk-high {
      font-size: 0.72rem; font-weight: 700; color: var(--accent-red);
      white-space: nowrap;
    }
    .warn-icon {
      color: var(--accent-red); margin-right: 4px;
      display: inline-block; vertical-align: middle;
      font-size: 0.9rem;
    }

    .btn-review {
      padding: 5px 14px;
      background: var(--accent-blue);
      border: none; border-radius: 6px;
      font-size: 0.72rem; font-weight: 600; color: #fff;
      cursor: pointer; white-space: nowrap;
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    .btn-review:hover {
      opacity: 0.85;
      box-shadow: 0 0 12px rgba(56,189,248,0.4);
    }
    .btn-review.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-review.outline:hover {
      border-color: var(--accent-blue); color: var(--accent-blue);
    }

    /* ── BOTTOM: Model Performance ── */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Trend Chart */
    .trend-body { padding: 16px 18px; }
    .mini-chart { width: 100%; height: 120px; }

    /* Top Anomalies */
    .anomaly-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
    /* .anomaly-row {} */
    .anomaly-label {
      font-size: 0.73rem; color: var(--text-muted); margin-bottom: 5px;
    }
    .anomaly-bar-wrap {
      display: flex; align-items: center; gap: 10px;
    }
    .anomaly-bar-bg {
      flex: 1; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .anomaly-bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }
    .anomaly-pct {
      font-size: 0.7rem; font-weight: 600; min-width: 36px; text-align: right;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat-card  { animation: fadeUp 0.5s ease both; }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.10s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }
    .stat-card:nth-child(4) { animation-delay: 0.20s; }
    .mid-grid > * { animation: fadeUp 0.5s ease both; animation-delay: 0.25s; }
    .bottom-grid > * { animation: fadeUp 0.5s ease both; animation-delay: 0.35s; }

    /* Pulse on fraud markers */
    @keyframes pulse-ring {
      0%   { transform: scale(0.6); opacity: 0.8; }
      80%  { transform: scale(2.2); opacity: 0; }
      100% { opacity: 0; }
    }
    .pulse-ring {
      animation: pulse-ring 2s ease-out infinite;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .stat-cards { grid-template-columns: repeat(2,1fr); }
      .mid-grid   { grid-template-columns: 1fr; }
      .bottom-grid{ grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      main { padding: 16px; }
      .stat-cards { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-value { font-size: 1.5rem; }
    }
  </style>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Rajdhani&family=Inter&display=swap" rel="stylesheet">
