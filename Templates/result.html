<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .result-card {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }

        h2 {
            color: #777;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .prediction-text {
            padding: 20px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Color classes */
        .is-fraud {
            background-color: #fff5f5;
            color: #e53e3e;
            border: 2px solid #feb2b2;
        }

        .is-safe {
            background-color: #f0fff4;
            color: #38a169;
            border: 2px solid #9ae6b4;
        }

        .back-link {
            text-decoration: none;
            color: #3182ce;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="result-card">
        <h2>Model Analysis Outcome</h2>
        
        <div class="prediction-text {% if ':Yes' in prediction %}is-fraud{% else %}is-safe{% endif %}">
            {{ prediction }}
        </div>

        <p><a href="/pp" class="back-link">Return to Dashboard</a></p>
    </div>
</body>
</html>
