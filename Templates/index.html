<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection System</title>
    <style>
        :root {
            --primary: #1a237e;
            --accent: #007bff;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0d144d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fraud Detection Form</h1>
        <form action="/process" method="post">
            <div class="form-group">
                <label>Transaction Amount (INR)</label>
                <input type="number" step="any" name="Transaction_Amount_INR" placeholder="Enter amount" required>
            </div>

            <div class="form-group">
                <label>Is International?</label>
                <select name="Is_International" required>
                    <option value="0">No (Domestic)</option>
                    <option value="1">Yes (International)</option>
                </select>
            </div>

            <button type="submit">Analyze Transaction</button>
        </form>
    </div>
</body>
</html>
